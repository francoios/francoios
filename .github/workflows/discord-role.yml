name: Discord Sponsor Role
on:
  issues:
    types: [opened]

jobs:
  assign-discord-role:
    if: contains(github.event.issue.labels.*.name, 'discord-role')
    runs-on: ubuntu-latest
    steps:
      - name: Assign Discord Sponsor Role
        uses: actions/github-script@v7
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        with:
          script: |
            const issue = context.payload.issue;
            const issueBody = issue.body || '';
            const issueAuthor = issue.user.login;

            const discordIdMatch = issueBody.match(/(\d{17,20})/);
            if (!discordIdMatch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ **Could not find a valid Discord User ID.**\n\nPlease include your Discord User ID (a 17-20 digit number).\n\n**How to find it:**\n1. Discord Settings > Advanced > Enable Developer Mode\n2. Right-click your username > Copy User ID\n3. Edit this issue and paste your ID'
              });
              return;
            }
            const discordUserId = discordIdMatch[1];

            const guildId = '1206936908404629504';
            const ROLES = {
              'Private MCP Sponsor': '1479465964788781117',
              'MCP Priority Support': '1479473310952722494'
            };

            let roleName = 'Private MCP Sponsor';
            let roleId = ROLES['Private MCP Sponsor'];
            if (issueBody.toLowerCase().includes('priority support') || issueBody.toLowerCase().includes('mcp priority support')) {
              roleName = 'MCP Priority Support';
              roleId = ROLES['MCP Priority Support'];
            }

            try {
              const response = await fetch(
                `https://discord.com/api/v10/guilds/${guildId}/members/${discordUserId}/roles/${roleId}`,
                {
                  method: 'PUT',
                  headers: {
                    'Authorization': `Bot ${process.env.DISCORD_BOT_TOKEN}`,
                    'Content-Type': 'application/json'
                  }
                }
              );

              if (response.ok || response.status === 204) {
                if (roleName === 'MCP Priority Support') {
                  await fetch(
                    `https://discord.com/api/v10/guilds/${guildId}/members/${discordUserId}/roles/${ROLES['Private MCP Sponsor']}`,
                    {
                      method: 'PUT',
                      headers: {
                        'Authorization': `Bot ${process.env.DISCORD_BOT_TOKEN}`,
                        'Content-Type': 'application/json'
                      }
                    }
                  );
                }

                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ **Discord role assigned!**\n\nThe **${roleName}** role has been assigned to <@${discordUserId}>.\n\nThank you for your sponsorship, @${issueAuthor}! 💛`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, state: 'closed'
                });
              } else {
                let errorMsg = '❌ **Failed to assign Discord role.**\n\n';
                if (response.status === 404) {
                  errorMsg += `Discord User ID \`${discordUserId}\` was not found in the AnkleBreaker Studio server.\n\n**Make sure you:**\n1. Have joined the AnkleBreaker Studio Discord\n2. Copied the correct User ID (not your username)`;
                } else {
                  errorMsg += 'An error occurred. Please contact @francoios for manual role assignment.';
                }
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, body: errorMsg
                });
              }
            } catch (error) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ **Error assigning role.** Please contact @francoios for help.\n\nError: ${error.message}`
              });
            }
